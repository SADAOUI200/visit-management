<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الزيارات التفتيشية – نظام إدارة الزيارات</title>
    <meta name="description" content="إدخال وبحث الزيارات التفتيشية" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏫</text></svg>" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- Loader -->
    <div class="loader-overlay" id="loaderOverlay">
        <div class="spinner"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="brand">
            <span>🏫</span> نظام إدارة الزيارات التفتيشية
        </div>
        <div class="nav-links">
            <span class="user-info" id="navUserInfo"></span>
            <button id="adminLink" class="btn btn-ghost btn-sm" onclick="window.location.href='dashboard.html'"
                style="display:none;">
                ⚙️ لوحة التحكم
            </button>
            <button class="btn btn-sm"
                style="background:rgba(46,116,200,0.25);color:#93c5fd;border:1px solid rgba(46,116,200,0.35);"
                id="refreshBtn">
                🔄 تحديث
            </button>
            <button class="btn btn-danger btn-sm" onclick="logout()">خروج 🚪</button>
        </div>
    </nav>

    <div class="container">

        <!-- ── Visit Entry Form (modal) ───────────────────────────── -->
        <div id="visitModal" class="modal">
          <div class="modal-content">
            <button id="closeVisitModal" class="modal-close">&times;</button>
            <div class="card fade-in">
                <div class="card-title">✏️ إدخال زيارة تفتيشية جديدة</div>

            <!-- Loading state for dropdowns -->
            <div id="formLoadingMsg" style="
                text-align:center;padding:1.5rem;color:var(--text-muted);
                display:flex;align-items:center;justify-content:center;gap:0.75rem;">
                <div class="spinner" style="width:22px;height:22px;border-width:2px;position:static;transform:none;">
                </div>
                <span>جارٍ تحميل بيانات المفتشين والمؤسسات...</span>
            </div>

            <form id="visitForm" novalidate style="display:none;">
                <div class="form-grid">

                    <!-- المرحلة التعليمية (أولاً) -->
                    <div class="form-group">
                        <label for="stageSelect">المرحلة التعليمية <span class="req">*</span></label>
                        <select id="stageSelect" name="stage" required>
                            <option value="">-- اختر المرحلة --</option>
                            <option value="ابتدائي">ابتدائي</option>
                            <option value="متوسط">متوسط</option>
                            <option value="ثانوي">ثانوي</option>
                        </select>
                    </div>

                    <!-- اسم المفتش (يُفلتر حسب المرحلة) -->
                    <div class="form-group">
                        <label for="inspectorSelect">اسم المفتش <span class="req">*</span></label>
                        <select id="inspectorSelect" name="inspector" required disabled>
                            <option value="">-- اختر المرحلة أولاً --</option>
                        </select>
                    </div>

                    <!-- التخصص (يُملأ تلقائياً) -->
                    <div class="form-group">
                        <label for="specialty">التخصص <span class="req">*</span></label>
                        <select id="specialty" name="specialty" required disabled>
                            <option value="">-- سيظهر تلقائياً --</option>
                        </select>
                    </div>

                    <!-- البلدية -->
                    <div class="form-group">
                        <label for="municipalitySelect">البلدية <span class="req">*</span></label>
                        <select id="municipalitySelect" name="municipality" required>
                            <option value="">-- اختر البلدية --</option>
                        </select>
                    </div>

                    <!-- المؤسسة (تُفلتر حسب المرحلة والبلدية) -->
                    <div class="form-group">
                        <label for="institutionSelect">المؤسسة التعليمية <span class="req">*</span></label>
                        <select id="institutionSelect" name="institution" required disabled>
                            <option value="">-- اختر المرحلة والبلدية أولاً --</option>
                        </select>
                    </div>

                    <!-- اسم المعني بالزيارة -->
                    <div class="form-group">
                        <label for="visitee">اسم المعني بالزيارة <span class="req">*</span></label>
                        <input type="text" id="visitee" name="visitee" placeholder="اسم الأستاذ / المسؤول" required />
                    </div>

                    <!-- الرتبة -->
                    <div class="form-group">
                        <label for="rank">الرتبة</label>
                        <select id="rank" name="rank">
                            <option value="">-- اختر الرتبة --</option>
                            <option>أستاذ مبتدئ</option>
                            <option>أستاذ</option>
                            <option>أستاذ رئيسي</option>
                            <option>أستاذ مكوّن</option>
                            <option>مدير</option>
                            <option>ناظر</option>
                            <option>مستشار التربية</option>
                        </select>
                    </div>

                    <!-- الدرجة -->
                    <div class="form-group">
                        <label for="grade">الدرجة</label>
                        <input type="number" id="grade" name="grade" min="1" max="12" placeholder="مثال: 7" />
                    </div>

                    <!-- تاريخ الزيارة -->
                    <div class="form-group">
                        <label for="visitDate">تاريخ الزيارة <span class="req">*</span></label>
                        <input type="date" id="visitDate" name="visitDate" required />
                    </div>

                    <!-- نوع الزيارة -->
                    <div class="form-group">
                        <label for="visitType">نوع الزيارة <span class="req">*</span></label>
                        <select id="visitType" name="visitType" required>
                            <option value="">-- اختر نوع الزيارة --</option>
                            <option>زيارة تفتيشية عادية</option>
                            <option>زيارة مساعدة وإرشاد</option>
                            <option>زيارة متابعة</option>
                            <option>زيارة تقييمية</option>
                            <option>زيارة مفاجئة</option>
                        </select>
                    </div>

                    <!-- النقطة -->
                    <div class="form-group">
                        <label for="score">النقطة (من 20)</label>
                        <input type="number" id="score" name="score" min="0" max="20" step="0.25"
                            placeholder="مثال: 15.50" />
                    </div>

                    <!-- الموسم الدراسي -->
                    <div class="form-group">
                        <label for="season">الموسم الدراسي <span class="req">*</span></label>
                        <select id="season" name="season" required>
                            <option value="">-- اختر الموسم --</option>
                            <option>2025 / 2026</option>
                            <option>2024 / 2025</option>
                            <option>2026 / 2027</option>
                            <option>2023 / 2024</option>
                            <option>2022 / 2023</option>
                        </select>
                    </div>

                    <!-- العقوبات -->
                    <div class="form-group">
                        <label for="penalties">العقوبات</label>
                        <input type="text" id="penalties" name="penalties" placeholder="اذكر العقوبة إن وجدت" />
                    </div>

                    <!-- الملاحظة -->
                    <div class="form-group full-width">
                        <label for="notes">الملاحظة</label>
                        <textarea id="notes" name="notes" placeholder="أدخل ملاحظاتك التفصيلية هنا..."></textarea>
                    </div>

                </div><!-- /form-grid -->

                <div class="form-actions">
                    <button type="reset" class="btn btn-ghost" id="resetBtn">↺ مسح الحقول</button>
                    <button type="submit" class="btn btn-accent" id="submitBtn">
                        <span>📤</span> إرسال الزيارة
                    </button>
                </div>
            </form>
        </div><!-- /card -->

        <!-- ── Records Section ───────────────────────────────────── -->
        <div class="card fade-in">
            <div class="card-title" style="justify-content:space-between;flex-wrap:wrap;gap:0.5rem;">
                <span>🔍 البحث وعرض الزيارات</span>
                <button id="openVisitBtn" class="btn btn-accent btn-sm">➕ إضافة زيارة</button>
                <span id="resultsCount" style="font-size:0.85rem;color:var(--text-muted);font-weight:400;"></span>
            </div>

            <!-- API Diagnostic Panel -->
            <div id="apiDiagnostic" style="
              display:none;
              background:rgba(245,158,11,0.08);
              border:1px solid rgba(245,158,11,0.3);
              border-radius:10px;
              padding:0.85rem 1rem;
              margin-bottom:1rem;
              font-size:0.82rem;
              color:var(--text);
            "></div>

            <!-- Search Bar -->
            <div class="search-bar" style="margin-bottom:1.25rem;">
                <div class="form-group">
                    <label for="searchName">🔎 اسم المعني بالزيارة</label>
                    <div class="search-input-wrap">
                        <input type="search" id="searchName" placeholder="ابحث بالاسم..." />
                    </div>
                </div>
                <div class="form-group">
                    <label for="searchInst">🏫 المؤسسة</label>
                    <div class="search-input-wrap">
                        <input type="search" id="searchInst" placeholder="ابحث بالمؤسسة..." />
                    </div>
                </div>
                <div class="form-group">
                    <label for="searchInspector">👁️ اسم المفتش</label>
                    <div class="search-input-wrap">
                        <input type="search" id="searchInspector" placeholder="ابحث بالمفتش..." />
                    </div>
                </div>
                <div class="form-group" style="align-self:flex-end;">
                    <button class="btn btn-ghost" onclick="clearSearch()" style="width:100%;">✕ مسح البحث</button>
                </div>
            </div>

            <!-- Table -->
            <div class="table-wrap">
                <table id="visitsTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>المعرف</th>
                            <th>توقيت الإدخال</th>
                            <th>اسم المفتش</th>
                            <th>التخصص</th>
                            <th>المرحلة</th>
                            <th>اسم المعني</th>
                            <th>الرتبة</th>
                            <th>الدرجة</th>
                            <th>المؤسسة</th>
                            <th>تاريخ الزيارة</th>
                            <th>نوع الزيارة</th>
                            <th>النقطة</th>
                            <th>العقوبات</th>
                            <th>الموسم الدراسي</th>
                        </tr>
                    </thead>
                    <tbody id="visitsTableBody">
                        <tr>
                            <td colspan="15" class="empty-state">
                                <span class="icon">⏳</span>جارٍ تحميل البيانات...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div><!-- /container -->

    <script src="app.js"></script>
    <script src="data.js"></script>
    <script src="visit.js"></script>
    <script>
        console.log('[visit.html] inline script loaded');
        document.addEventListener('DOMContentLoaded', () => {
            console.log('[visit.html] DOM ready');
            // ── Auth guard ──────────────────────────────────────────
            const session = requireAuth(['admin', 'inspector', 'manager']);
        if (!session) throw new Error('Not authenticated');

        // Nav info
        document.getElementById('navUserInfo').innerHTML =
            `مرحباً <strong>${session.name}</strong> &nbsp;|&nbsp; <span class="badge ${roleBadgeClass(session.role)}">${roleLabel(session.role)}</span>`;

        if (session.role === 'admin') {
            document.getElementById('adminLink').style.display = 'inline-flex';
        }

        // For inspectors, pre-fill and disable inspector select
        if (session.role === 'inspector') {
            const inspectorSelect = document.getElementById('inspectorSelect');
            if (inspectorSelect) {
                inspectorSelect.innerHTML = `<option value="${session.name}">${session.name}</option>`;
                inspectorSelect.value = session.name;
                inspectorSelect.disabled = true;
            }
        }

        // Pre-fill today's date
        const today = new Date().toISOString().split('T')[0];
        const visitDateEl = document.getElementById('visitDate');
        if (visitDateEl) visitDateEl.value = today;

        // Populate specialty select
        const specSel = document.getElementById('specialty');
        SPECIALTIES.forEach(s => {
            const opt = document.createElement('option');
            opt.textContent = s;
            specSel.appendChild(opt);
        });

        // ── Fixed Municipalities List ──────────────────────────────────
        const MUNICIPALITIES = [
            'توقرت',
            'النزلة',
            'تبسبست',
            'الزاوية العابدية',
            'تماسين',
            'بلدة عمر',
            'المنقر',
            'الطيبات',
            'بن ناصر',
            'المقارين',
            'سيدي سليمان',
            'الحجيرة',
            'العالية'
        ];

        // ── Load inspectors & institutions into form ────────────
        let _inspectorsList = [];
        let _institutionsList = [];
        let _municipalitiesList = [];

        async function initFormDropdowns() {
            // show a message if loading takes too long
            const slowTimer = setTimeout(() => {
                document.getElementById('formLoadingMsg').textContent =
                    'جارٍ تحميل بيانات المفتشين والمؤسسات... (قد يستغرق وقتاً أطول)';
            }, 5000);

            let inspectors = [];
            let institutions = [];
            try {
                [inspectors, institutions] = await Promise.all([
                    fetchInspectors(),
                    fetchInstitutions()
                ]);
                console.log('[visit.html] Fetched inspectors:', inspectors);
                console.log('[visit.html] Inspectors count:', inspectors.length);
                if (inspectors.length > 0) {
                    console.log('[visit.html] First inspector keys:', Object.keys(inspectors[0]));
                    console.log('[visit.html] First inspector data:', inspectors[0]);
                }
            } catch (err) {
                console.error('[visit.html] initFormDropdowns error:', err);
            } finally {
                clearTimeout(slowTimer);
            }

            _inspectorsList = inspectors;
            _institutionsList = institutions;
            _municipalitiesList = MUNICIPALITIES; // Use fixed list

            // Populate municipalities select
            const munSel = document.getElementById('municipalitySelect');
            munSel.innerHTML = '<option value="">-- اختر البلدية --</option>';
            _municipalitiesList.forEach(mun => {
                const opt = document.createElement('option');
                opt.value = mun;
                opt.textContent = mun;
                munSel.appendChild(opt);
            });

            // show errors if we couldn't load required data
            if (!_inspectorsList.length || !_institutionsList.length) {
                showToast('تعذّر تحميل بعض البيانات، يُرجى التحقق من الاتصال أو إعادة المحاولة', 'error', 6000);
            }

            // If inspector role → pre-fill stage, specialty & disable fields
            if (session.role === 'inspector') {
                const inspectorData = inspectors.find(ins => ins['الاسم'] === session.name);
                if (inspectorData) {
                    const stage = inspectorData['المرحلة'];
                    const specialty = inspectorData['التخصص'];
                    if (stage) {
                        document.getElementById('stageSelect').value = stage;
                        document.getElementById('stageSelect').disabled = true;
                    }
                    if (specialty) {
                        const specialtySelect = document.getElementById('specialty');
                        specialtySelect.innerHTML = `<option value="${specialty}">${specialty}</option>`;
                        specialtySelect.value = specialty;
                        specialtySelect.disabled = true;
                    }
                }
            }

            // Hide loading, show form
            document.getElementById('formLoadingMsg').style.display = 'none';
            document.getElementById('visitForm').style.display = '';
        }

        // ── Handle stage selection ──────────────────────────────
        document.getElementById('stageSelect').addEventListener('change', function() {
            const selectedStage = this.value;
            const inspectorSelect = document.getElementById('inspectorSelect');
            const specialtySelect = document.getElementById('specialty');

            if (!selectedStage) {
                // Reset inspectors
                inspectorSelect.innerHTML = '<option value="">-- اختر المرحلة أولاً --</option>';
                inspectorSelect.disabled = true;
                specialtySelect.innerHTML = '<option value="">-- سيظهر تلقائياً --</option>';
                specialtySelect.disabled = true;
                return;
            }

            // Filter inspectors by selected stage
            const filteredInspectors = filterInspectorsByLevel(_inspectorsList, selectedStage);
            console.log('[visit.html] Stage selected:', selectedStage);
            console.log('[visit.html] Filtered inspectors:', filteredInspectors);

            // Populate inspectors select
            inspectorSelect.innerHTML = '<option value="">-- اختر المفتش --</option>';
            filteredInspectors.forEach(ins => {
                const nameValue = ins['الاسم'] || '';
                console.log('[visit.html] Adding inspector option:', nameValue, 'from data:', ins);
                const opt = document.createElement('option');
                opt.value = nameValue;
                opt.textContent = nameValue || '—';
                opt.dataset.specialty = ins['التخصص'] || '';
                inspectorSelect.appendChild(opt);
            });

            inspectorSelect.disabled = false;

            // If inspector role and only one option, auto-select
            if (session.role === 'inspector' && filteredInspectors.length === 1) {
                inspectorSelect.value = filteredInspectors[0]['الاسم'];
                inspectorSelect.dispatchEvent(new Event('change'));
            }
        });

        // ── Handle inspector selection ──────────────────────────
        document.getElementById('inspectorSelect').addEventListener('change', function() {
            const selectedInspector = this.value;
            const specialtySelect = document.getElementById('specialty');

            if (!selectedInspector) {
                specialtySelect.innerHTML = '<option value="">-- سيظهر تلقائياً --</option>';
                specialtySelect.disabled = true;
                return;
            }

            // Find selected inspector data
            const inspectorData = _inspectorsList.find(ins => ins['الاسم'] === selectedInspector);
            if (inspectorData) {
                const specialty = inspectorData['التخصص'] || '';
                specialtySelect.innerHTML = `<option value="${specialty}">${specialty}</option>`;
                specialtySelect.value = specialty;
                specialtySelect.disabled = false;
            }
        });

        // ── Handle municipality and stage change for institutions ─
        function updateInstitutionsSelect() {
            const selectedStage = document.getElementById('stageSelect').value;
            const selectedMunicipality = document.getElementById('municipalitySelect').value;
            const institutionSelect = document.getElementById('institutionSelect');

            if (!selectedStage || !selectedMunicipality) {
                institutionSelect.innerHTML = '<option value="">-- اختر المرحلة والبلدية أولاً --</option>';
                institutionSelect.disabled = true;
                return;
            }

            // Filter institutions by stage and municipality
            const filteredInstitutions = filterInstitutionsByLevelAndMunicipality(
                _institutionsList, selectedStage, selectedMunicipality
            );

            // Populate institutions select
            institutionSelect.innerHTML = '<option value="">-- اختر المؤسسة --</option>';
            filteredInstitutions.forEach(inst => {
                const opt = document.createElement('option');
                const name = inst['اسم المؤسسة'] || '';
                opt.value = name;
                opt.textContent = name;
                institutionSelect.appendChild(opt);
            });

            institutionSelect.disabled = false;
        }

        document.getElementById('stageSelect').addEventListener('change', updateInstitutionsSelect);
        document.getElementById('municipalitySelect').addEventListener('change', updateInstitutionsSelect);

        // ── Visit Form Submit ───────────────────────────────────
        document.getElementById('visitForm').addEventListener('submit', async (e) => {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span>⏳</span> جارٍ الإرسال...';

            await handleVisitSubmit(e);

            btn.disabled = false;
            btn.innerHTML = '<span>📤</span> إرسال الزيارة';

            if (session.role === 'inspector') {
                const inspSel = document.getElementById('inspectorSelect');
                if (inspSel) {
                    const found = [...inspSel.options].find(o =>
                        o.value.trim() === session.name.trim()
                    );
                    if (found) inspSel.value = found.value;
                }
            }
            const visitDateEl = document.getElementById('visitDate');
            if (visitDateEl) visitDateEl.value = today;
        });

        // ── Refresh Button ──────────────────────────────────────
        document.getElementById('refreshBtn').addEventListener('click', async () => {
            const btn = document.getElementById('refreshBtn');
            btn.textContent = '⏳';
            await loadVisits();
            btn.textContent = '🔄 تحديث';
        });

        // ── Modal controls ──────────────────────────────────────
        const openBtn = document.getElementById('openVisitBtn');
        if (openBtn) {
            openBtn.addEventListener('click', () => {
                resetFormFilters();
                document.getElementById('visitForm').reset();
                showVisitModal();
            });
        }
        const closeBtn = document.getElementById('closeVisitModal');
        if (closeBtn) closeBtn.addEventListener('click', hideVisitModal);

        function showVisitModal() {
            const m = document.getElementById('visitModal');
            if (m) {
                m.style.display = 'flex';
                setTimeout(() => {
                    const first = document.getElementById('stageSelect');
                    if (first) first.focus();
                }, 50);
            }
        }
        function hideVisitModal() {
            const m = document.getElementById('visitModal');
            if (m) m.style.display = 'none';
            // clear form fields when closing
            const form = document.getElementById('visitForm');
            if (form) {
                form.reset();
                resetFormFilters();
            }
        }
        // close when clicking outside content
        const visitModalEl = document.getElementById('visitModal');
        if (visitModalEl) {
            visitModalEl.addEventListener('click', (e) => {
                if (e.target === e.currentTarget) hideVisitModal();
            });
        }

        // ── Initialize form dropdowns ───────────────────────────
        initFormDropdowns();

        // ── Dynamic Search ──────────────────────────────────────
        ['searchName', 'searchInst', 'searchInspector'].forEach(id => {
            document.getElementById(id)?.addEventListener('input', applySearch);
        });

        function clearSearch() {
            ['searchName', 'searchInst', 'searchInspector'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = '';
            });
            applySearch();
        }

        // ── Reset Button ────────────────────────────────────────
        const resetBtn = document.getElementById('resetBtn');
        if (resetBtn) {
            resetBtn.addEventListener('click', () => {
                setTimeout(() => {
                    if (session.role === 'inspector') {
                        const inspSel = document.getElementById('inspectorSelect');
                        if (inspSel) {
                            const found = [...inspSel.options].find(o =>
                                o.value.trim() === session.name.trim()
                            );
                            if (found) inspSel.value = found.value;
                        }
                    }
                    const visitDateEl = document.getElementById('visitDate');
                    if (visitDateEl) visitDateEl.value = today;
                }, 50);
            });
        }

        // ── Init ────────────────────────────────────────────────
        initFormDropdowns();
        loadVisits();
        }); // end DOMContentLoaded
    </script>
</body>

</html>
