<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل الدخول – نظام إدارة الزيارات التفتيشية</title>
    <meta name="description" content="نظام إدارة الزيارات التفتيشية - تسجيل الدخول" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏫</text></svg>" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="login-wrapper">
        <div class="login-box fade-in">
            <div class="login-logo">
                <div class="icon-wrap">🏫</div>
                <h1>نظام إدارة الزيارات التفتيشية</h1>
                <p>يرجى تسجيل الدخول للمتابعة</p>
            </div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="username">اسم المستخدم</label>
                    <input type="text" id="username" name="username" placeholder="أدخل اسم المستخدم"
                        autocomplete="username" required />
                </div>
                <div class="form-group">
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" name="password" placeholder="أدخل كلمة المرور"
                        autocomplete="current-password" required />
                </div>

                <div class="login-error" id="loginError"></div>

                <button type="submit" class="btn btn-primary login-btn" id="loginBtn">
                    <span>🔐</span> دخول
                </button>
            </form>

            <p style="text-align:center; margin-top:1.25rem; font-size:0.8rem; color:var(--text-muted);">
                نظام إدارة الزيارات التفتيشية &copy; 2025
            </p>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // If already logged in, redirect
        (function () {
            const sess = getSession();
            if (sess) {
                window.location.href = sess.role === 'admin' ? 'dashboard.html' : 'visit.html';
            }
        })();

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errEl = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            errEl.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'جارٍ التحقق...';

            setTimeout(() => {
                const result = login(username, password);
                if (result.ok) {
                    btn.textContent = '✅ تم الدخول';
                    window.location.href = result.user.role === 'admin' ? 'dashboard.html' : 'visit.html';
                } else {
                    errEl.style.display = 'block';
                    errEl.textContent = result.msg;
                    btn.disabled = false;
                    btn.innerHTML = '<span>🔐</span> دخول';
                }
            }, 400);
        });
    </script>
</body>

</html>
