<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إدارة المؤسسات – نظام إدارة الزيارات التفتيشية</title>
    <meta name="description" content="إضافة وعرض المؤسسات التعليمية" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏫</text></svg>" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- Loader -->
    <div class="loader-overlay" id="loaderOverlay">
        <div class="spinner"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="brand">
            <span>🏫</span> نظام إدارة الزيارات التفتيشية
        </div>
        <div class="nav-links">
            <span class="user-info" id="navUserInfo"></span>
            <a href="dashboard.html" class="btn btn-ghost btn-sm">⚙️ لوحة التحكم</a>
            <a href="visit.html" class="btn btn-ghost btn-sm">📋 الزيارات</a>
            <button class="btn btn-danger btn-sm" onclick="logout()">خروج 🚪</button>
        </div>
    </nav>

    <div class="container">

        <!-- Page Header -->
        <div style="margin-bottom:1.5rem; display:flex; align-items:center; gap:1rem;">
            <div style="width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#10b981,#059669);
                        display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;">🏫
            </div>
            <div>
                <h2 style="margin:0;font-size:1.4rem;color:var(--text);">إدارة المؤسسات التعليمية</h2>
                <p style="margin:0;font-size:0.85rem;color:var(--text-muted);">إضافة وعرض المؤسسات المسجّلة في المنظومة
                </p>
            </div>
            <span id="instCount" style="margin-right:auto;background:rgba(16,185,129,0.15);color:#6ee7b7;
                  padding:4px 14px;border-radius:20px;font-size:0.85rem;font-weight:600;"></span>
        </div>

        <!-- ── Add Institution Form ────────────────────────────── -->
        <div class="card fade-in">
            <div class="card-title">➕ إضافة مؤسسة تعليمية</div>
            <form id="institutionForm" novalidate>
                <div class="form-grid">

                    <!-- البلدية -->
                    <div class="form-group">
                        <label for="instMunicipality">البلدية <span class="req">*</span></label>
                        <select id="instMunicipality" name="municipality" required>
                            <option value="">-- اختر البلدية --</option>
                        </select>
                    </div>

                    <!-- اسم المؤسسة -->
                    <div class="form-group">
                        <label for="instName">اسم المؤسسة <span class="req">*</span></label>
                        <input type="text" id="instName" name="instName" placeholder="الاسم الرسمي للمؤسسة" required />
                    </div>

                    <!-- المرحلة التعليمية -->
                    <div class="form-group">
                        <label for="instLevel">المرحلة التعليمية <span class="req">*</span></label>
                        <select id="instLevel" name="level" required>
                            <option value="">-- اختر المرحلة --</option>
                            <option>ابتدائي</option>
                            <option>متوسط</option>
                            <option>ثانوي</option>
                        </select>
                    </div>

                    <!-- مدير المؤسسة (اختياري) -->
                    <div class="form-group">
                        <label for="instDirector">
                            مدير المؤسسة
                            <span style="color:var(--text-muted);font-size:0.78rem;">(اختياري)</span>
                        </label>
                        <input type="text" id="instDirector" name="director" placeholder="اسم مدير المؤسسة" />
                    </div>

                    <!-- المسيّر المالي (اختياري) -->
                    <div class="form-group">
                        <label for="instFinManager">
                            المسيّر المالي
                            <span style="color:var(--text-muted);font-size:0.78rem;">(اختياري)</span>
                        </label>
                        <input type="text" id="instFinManager" name="finManager" placeholder="اسم المسيّر المالي" />
                    </div>

                </div><!-- /form-grid -->

                <div class="form-actions">
                    <button type="reset" class="btn btn-ghost" id="instResetBtn">↺ مسح الحقول</button>
                    <button type="submit" class="btn btn-accent" id="instSubmitBtn">
                        <span>💾</span> حفظ المؤسسة
                    </button>
                </div>
            </form>
        </div>

        <!-- ── Institutions Table ──────────────────────────────── -->
        <div class="card fade-in">
            <div class="card-title" style="justify-content:space-between;flex-wrap:wrap;gap:0.5rem;">
                <span>🔎 قائمة المؤسسات</span>
            </div>

            <!-- Search -->
            <div class="search-bar" style="margin-bottom:1.25rem;">
                <div class="form-group">
                    <label for="searchInstName">🏫 اسم المؤسسة</label>
                    <div class="search-input-wrap">
                        <input type="search" id="searchInstName" placeholder="ابحث بالاسم..." />
                    </div>
                </div>
                <div class="form-group">
                    <label for="searchInstMunicipality">📍 البلدية</label>
                    <div class="search-input-wrap">
                        <input type="search" id="searchInstMunicipality" placeholder="ابحث بالبلدية..." />
                    </div>
                </div>
                <div class="form-group">
                    <label for="searchInstLevel">🎓 المرحلة</label>
                    <select id="searchInstLevel">
                        <option value="">-- كل المراحل --</option>
                        <option>ابتدائي</option>
                        <option>متوسط</option>
                        <option>ثانوي</option>
                    </select>
                </div>
                <div class="form-group" style="align-self:flex-end;">
                    <button class="btn btn-ghost" onclick="clearInstSearch()" style="width:100%;">✕ مسح البحث</button>
                </div>
            </div>

            <!-- Table -->
            <div class="table-wrap">
                <table id="institutionsTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>البلدية</th>
                            <th>اسم المؤسسة</th>
                            <th>المرحلة</th>
                            <th>مدير المؤسسة</th>
                            <th>المسيّر المالي</th>
                        </tr>
                    </thead>
                    <tbody id="institutionsTableBody">
                        <tr>
                            <td colspan="6" class="empty-state">
                                <span class="icon">⏳</span>جارٍ تحميل البيانات...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div><!-- /container -->

    <script src="data.js"></script>
    <script src="app.js"></script>
    <script src="institutions.js"></script>
</body>

</html>
